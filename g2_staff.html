<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>남한산성 배송지도</title>
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0tx9u02jhx"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
#hd{background:#03C75A;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,0.15);position:relative;z-index:10}
#hd h1{font-size:16px;font-weight:700}
.cnt{background:rgba(255,255,255,0.25);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
#map{width:100%;height:calc(100vh - 50px)}
.iw{background:#fff;border-radius:10px;padding:12px 14px;min-width:200px;max-width:260px;box-shadow:0 3px 16px rgba(0,0,0,0.18);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;position:relative}
.iw-course{font-size:11px;font-weight:700;color:#03C75A;margin-bottom:3px}
.iw-name{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:5px;line-height:1.4}
.iw-addr{font-size:12px;color:#888;line-height:1.5}
.iw-tail{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #fff}
.iw-group-badge{display:inline-block;background:#e8f5e9;color:#1b5e20;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.iw-item{padding:5px 0;font-size:13px;font-weight:600;color:#1a1a2e;border-bottom:1px solid #f5f5f5}
.iw-item:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="hd">
  <h1>남한산성 배송지도</h1>
  <span class="cnt">7개 거래처</span>
</div>
<div id="map"></div>
<script>
const COURSE="남한산성";
const stores=[{"n": "경성빵공장(남한산성)", "a": "경기 광주시 남한산성면 남한산성로 714 1층 2층", "lat": 37.475948, "lng": 127.1905825, "s": 1310400, "p": 182832, "mg": 0.13952380952380952, "t": 11, "pt": 119127}, {"n": "위베이크(남한산성)", "a": "경기 광주시 남한산성면 남한산성로 59-3 1층", "lat": 37.4599224, "lng": 127.2425687, "s": 307320, "p": 49920, "mg": 0.16243654822335024, "t": 5, "pt": 61464}, {"n": "개울테라스(남한산성)", "a": "경기 광주시 남한산성면 남한산성로 212-5 1층", "lat": 37.4560781, "lng": 127.2293909, "s": 242310, "p": 39360, "mg": 0.16243654822335024, "t": 5, "pt": 48462}, {"n": "카페뷰바이월드그린(남한산성)", "a": "경기 광주시 남한산성면 남한산성로 373 동소27-4~6 동소28", "lat": 37.4582169, "lng": 127.2166045, "s": 219550, "p": 30415, "mg": 0.13910359021266866, "t": 5, "pt": 43910}, {"n": "히든카페(남한산성)", "a": "경기 광주시 남한산성면 불당길37번길 30 1층", "lat": 37.4548365, "lng": 127.2122437, "s": 201260, "p": 26916, "mg": 0.13433819125573968, "t": 5, "pt": 40252}, {"n": "수수정원(남한산성)", "a": "경기 광주시 남한산성면 남한산성로780번길 22 1층", "lat": 37.4801301, "lng": 127.1843694, "s": 84710, "p": 13760, "mg": 0.16243654822335024, "t": 2, "pt": 42355}, {"n": "", "a": "", "lat": null, "lng": null, "s": 2365550, "p": 343203, "mg": 0.14519428873611845, "t": 33, "pt": 71683}];

const map=new naver.maps.Map('map',{
  center:new naver.maps.LatLng(37.5,127.0),
  zoom:11,
  mapTypeId:naver.maps.MapTypeId.NORMAL
});
let ow=null;

const groups={};
stores.forEach(s=>{
  if(!s.lat||!s.lng)return;
  const key=s.lat.toFixed(4)+','+s.lng.toFixed(4);
  if(!groups[key])groups[key]=[];
  groups[key].push(s);
});

const bounds=new naver.maps.LatLngBounds();

Object.values(groups).forEach(grp=>{
  const s0=grp[0];
  const cnt=grp.length;
  bounds.extend(new naver.maps.LatLng(s0.lat,s0.lng));

  const markerHtml=cnt>1
    ?`<div style="width:32px;height:32px;background:#03C75A;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;transition:transform .15s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">${cnt}</div>`
    :`<div style="width:22px;height:22px;background:#03C75A;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:pointer;transition:transform .15s" onmouseover="this.style.transform='scale(1.25)'" onmouseout="this.style.transform='scale(1)'"></div>`;

  const mk=new naver.maps.Marker({
    position:new naver.maps.LatLng(s0.lat,s0.lng),
    map,
    icon:{content:markerHtml,anchor:new naver.maps.Point(cnt>1?16:11,cnt>1?16:11)}
  });

  let iwContent='';
  if(cnt===1){
    iwContent=`<div class="iw"><div class="iw-course">${COURSE}</div><div class="iw-name">${s0.n}</div><div class="iw-addr">${s0.a}</div><div class="iw-tail"></div></div>`;
  }else{
    const items=grp.map(s=>`<div class="iw-item">${s.n}</div>`).join('');
    iwContent=`<div class="iw"><div class="iw-course">${COURSE}</div><div class="iw-addr" style="margin-bottom:6px">${s0.a}</div><div class="iw-group-badge">총 ${cnt}개 거래처</div><div style="margin-top:4px">${items}</div><div class="iw-tail"></div></div>`;
  }

  const iw=new naver.maps.InfoWindow({content:iwContent,borderWidth:0,disableAnchor:true,backgroundColor:'transparent',pixelOffset:new naver.maps.Point(0,-12)});
  naver.maps.Event.addListener(mk,'click',()=>{
    if(ow)ow.close();
    if(ow===iw){ow=null;return}
    iw.open(map,mk);ow=iw;
  });
});

if(!bounds.isEmpty()){
  map.fitBounds(bounds,{top:60,right:40,bottom:40,left:40});
}

map.addListener('click',()=>{if(ow){ow.close();ow=null}});
</script>
</body>
</html>
