<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H 지입 배송지도</title>
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=0tx9u02jhx"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
#hd{background:#03C75A;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,0.15);position:relative;z-index:10}
#hd h1{font-size:16px;font-weight:700}
.cnt{background:rgba(255,255,255,0.25);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
#map{width:100%;height:calc(100vh - 50px)}
.iw{background:#fff;border-radius:10px;padding:12px 14px;min-width:200px;max-width:260px;box-shadow:0 3px 16px rgba(0,0,0,0.18);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;position:relative}
.iw-course{font-size:11px;font-weight:700;color:#03C75A;margin-bottom:3px}
.iw-name{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:5px;line-height:1.4}
.iw-addr{font-size:12px;color:#888;line-height:1.5}
.iw-tail{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #fff}
.iw-group-badge{display:inline-block;background:#e8f5e9;color:#1b5e20;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.iw-item{padding:5px 0;font-size:13px;font-weight:600;color:#1a1a2e;border-bottom:1px solid #f5f5f5}
.iw-item:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="hd">
  <h1>H 지입 배송지도</h1>
  <span class="cnt">23개 거래처</span>
</div>
<div id="map"></div>
<script>
const COURSE="H 지입";
const stores=[{"n": "스테레오스코프커피", "a": "서울 강남구 압구정로 343 갤러리아백화점 WEST 지하 1층", "lat": 37.5284458, "lng": 127.040104, "s": 3154590, "p": 382142, "mg": 0.12113840467382449, "t": 50, "pt": 63092}, {"n": "아띠몽 코엑스메가박스점(강남)", "a": "서울 강남구 테헤란로87길 58 B1 메가박스옆", "lat": 37.5120151, "lng": 127.0575397, "s": 2842780, "p": 469474, "mg": 0.16514608939137043, "t": 32, "pt": 88837}, {"n": "봉은사 여여카페(강남)", "a": "서울 강남구 봉은사로 531 여여카페", "lat": 37.5149197, "lng": 127.0576546, "s": 2589780, "p": 385867, "mg": 0.1489960537188487, "t": 38, "pt": 68152}, {"n": "스누피플레이스(강남)", "a": "서울 서초구 신반포로 176 신세계백화점 강남점 10층 스누피플레이스", "lat": 37.5038952, "lng": 127.004752, "s": 1950600, "p": 313200, "mg": 0.1605659796985543, "t": 15, "pt": 130040}, {"n": "팝퍼블_잠실점(송파)", "a": "서울 송파구 올림픽로 240 롯데백화점 2층 키네틱그라운드 내", "lat": 37.511088, "lng": 127.0982822, "s": 1423950, "p": 204192, "mg": 0.14339829347940589, "t": 17, "pt": 83762}, {"n": "에덴스벨리_코엑스(강남)", "a": "서울 강남구 영동대로 513 스타필드 코엑스점 B1층 P108호 없음", "lat": 37.5118239, "lng": 127.0591591, "s": 1176230, "p": 202628, "mg": 0.17226902901643387, "t": 22, "pt": 53465}, {"n": "팥고당 강남구청점(강남)", "a": "서울 강남구 선릉로131길 12 1층", "lat": 37.5179193, "lng": 127.0398933, "s": 1132315, "p": 129177, "mg": 0.11408221210528872, "t": 27, "pt": 41938}, {"n": "산스 신세계강남 팝업(강남)", "a": "서울 서초구 신반포로 176 B1층 산스", "lat": 37.5038952, "lng": 127.004752, "s": 1088764, "p": 123220, "mg": 0.11317420487819216, "t": 16, "pt": 68048}, {"n": "온앤오프(서초)", "a": "서울특별시 서초구 효령로321, 1층 (서초동,덕원빌딩)(메가스터디 건물)", "lat": 37.4861335, "lng": 127.0191855, "s": 1076200, "p": 168720, "mg": 0.15677383385987734, "t": 13, "pt": 82785}, {"n": "*살롱드아난티_캐비네드아난티사옥(강남)", "a": "서울 강남구 논현로136길 11 없음", "lat": 37.5162328, "lng": 127.0310428, "s": 855600, "p": 130200, "mg": 0.15217391304347827, "t": 8, "pt": 106950}, {"n": "마이멜로디 하모니 카페(송파)", "a": "서울 송파구 올림픽로 240 롯데월드 쇼핑몰동 지하 1층", "lat": 37.511088, "lng": 127.0982822, "s": 783000, "p": 109740, "mg": 0.14015325670498086, "t": 12, "pt": 65250}, {"n": "HLB사옥카페(강남)", "a": "서울 강남구 논현로 662 1층 HLB사옥카페", "lat": 37.5131798, "lng": 127.0315441, "s": 666740, "p": 83290, "mg": 0.12492125866154723, "t": 14, "pt": 47624}, {"n": "키커피 파미에스테이션점(서초)", "a": "서울 서초구 사평대로 205 1층 키커피컴퍼니", "lat": 37.5044921, "lng": 127.0078453, "s": 583105, "p": 83526, "mg": 0.14324349816928342, "t": 26, "pt": 22427}, {"n": "온고지신 센트럴시티점(서초)", "a": "서울 서초구 신반포로 176, 1M층 M4호 (반포동,센트럴시티)", "lat": 37.5038952, "lng": 127.004752, "s": 559700, "p": 86383, "mg": 0.15433803823476863, "t": 22, "pt": 25441}, {"n": "도노커피_버킷플레이스1(강남)", "a": "서울 서초구 서초대로74길 4 삼성생명 서초타워 27층", "lat": 37.4967406, "lng": 127.0257311, "s": 528000, "p": 94320, "mg": 0.17863636363636365, "t": 4, "pt": 132000}, {"n": "산스 현대백화점 압구정 팝업(강남)", "a": "서울 강남구 압구정로 165 지하 1층", "lat": 37.5273756, "lng": 127.027458, "s": 514368, "p": 86980, "mg": 0.1691007216623118, "t": 9, "pt": 57152}, {"n": "일마지오(강남)", "a": "서울 강남구 학동로 426 본관 1층 카페", "lat": 37.517305, "lng": 127.047502, "s": 324000, "p": 63792, "mg": 0.1968888888888889, "t": 6, "pt": 54000}, {"n": "도노커피_블루버드(강남)", "a": "서울 강남구 일원로 115 삼성생명 빌딩 3층", "lat": 37.4840224, "lng": 127.0844597, "s": 316800, "p": 56592, "mg": 0.17863636363636365, "t": 4, "pt": 79200}, {"n": "도노커피_하이퍼커넥트(강남)", "a": "서울 강남구 영동대로 517 아셈타워 20층", "lat": 37.5130502, "lng": 127.0598322, "s": 313900, "p": 58496, "mg": 0.18635234151003505, "t": 8, "pt": 39238}, {"n": "이스터서울_갤러리아백화점(강남)", "a": "서울 강남구 압구정로 343 갤러리아 명품관WEST 지하 1층", "lat": 37.5284458, "lng": 127.040104, "s": 187760, "p": 33424, "mg": 0.178014486578611, "t": 5, "pt": 37552}, {"n": "도노커피_버킷플레이스2(강남)", "a": "서울 서초구 서초대로74길 4 삼성생명 서초타워 25층", "lat": 37.4967406, "lng": 127.0257311, "s": 176000, "p": 31440, "mg": 0.17863636363636365, "t": 4, "pt": 44000}, {"n": "하프커피_파미에(서초)", "a": "서울 서초구 사평대로 205 센트럴시티 파미에스테이션 2층 FP212호 하프커피", "lat": 37.5044921, "lng": 127.0078453, "s": 136800, "p": 23564, "mg": 0.1722514619883041, "t": 3, "pt": 45600}, {"n": "", "a": "", "lat": null, "lng": null, "s": 0, "p": 0, "mg": 0.0, "t": 0, "pt": 0}];

const map=new naver.maps.Map('map',{
  center:new naver.maps.LatLng(37.5,127.0),
  zoom:11,
  mapTypeId:naver.maps.MapTypeId.NORMAL
});
let ow=null;

const groups={};
stores.forEach(s=>{
  if(!s.lat||!s.lng)return;
  const key=s.lat.toFixed(4)+','+s.lng.toFixed(4);
  if(!groups[key])groups[key]=[];
  groups[key].push(s);
});

const bounds=new naver.maps.LatLngBounds();

Object.values(groups).forEach(grp=>{
  const s0=grp[0];
  const cnt=grp.length;
  bounds.extend(new naver.maps.LatLng(s0.lat,s0.lng));

  const markerHtml=cnt>1
    ?`<div style="width:32px;height:32px;background:#03C75A;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;transition:transform .15s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">${cnt}</div>`
    :`<div style="width:22px;height:22px;background:#03C75A;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:pointer;transition:transform .15s" onmouseover="this.style.transform='scale(1.25)'" onmouseout="this.style.transform='scale(1)'"></div>`;

  const mk=new naver.maps.Marker({
    position:new naver.maps.LatLng(s0.lat,s0.lng),
    map,
    icon:{content:markerHtml,anchor:new naver.maps.Point(cnt>1?16:11,cnt>1?16:11)}
  });

  let iwContent='';
  if(cnt===1){
    iwContent=`<div class="iw"><div class="iw-course">${COURSE}</div><div class="iw-name">${s0.n}</div><div class="iw-addr">${s0.a}</div><div class="iw-tail"></div></div>`;
  }else{
    const items=grp.map(s=>`<div class="iw-item">${s.n}</div>`).join('');
    iwContent=`<div class="iw"><div class="iw-course">${COURSE}</div><div class="iw-addr" style="margin-bottom:6px">${s0.a}</div><div class="iw-group-badge">총 ${cnt}개 거래처</div><div style="margin-top:4px">${items}</div><div class="iw-tail"></div></div>`;
  }

  const iw=new naver.maps.InfoWindow({content:iwContent,borderWidth:0,disableAnchor:true,backgroundColor:'transparent',pixelOffset:new naver.maps.Point(0,-12)});
  naver.maps.Event.addListener(mk,'click',()=>{
    if(ow)ow.close();
    if(ow===iw){ow=null;return}
    iw.open(map,mk);ow=iw;
  });
});

if(!bounds.isEmpty()){
  map.fitBounds(bounds,{top:60,right:40,bottom:40,left:40});
}

map.addListener('click',()=>{if(ow){ow.close();ow=null}});
</script>
</body>
</html>
