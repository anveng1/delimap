function gc(s){return s>=5000000?'#e84040':s>=1000000?'#e67e00':'#03874a'}
function gs(s){return s>=5000000?20:s>=2000000?16:s>=1000000?13:10}
function fm(n){if(n>=10000000)return(n/10000000).toFixed(1)+'천만원';if(n>=1000000)return(n/10000).toFixed(0)+'만원';return n.toLocaleString()+'원'}
function pct(v){return(v*100).toFixed(1)+'%'}

const map=new naver.maps.Map('map',{
  center:new naver.maps.LatLng(37.5,127.0),
  zoom:11,
  mapTypeId:naver.maps.MapTypeId.NORMAL
});
let ow=null;

// 좌표 그룹핑 (소수점 4자리 기준 — 같은 건물 처리)
const groups={};
stores.forEach(s=>{
  if(!s.lat||!s.lng)return;
  const key=s.lat.toFixed(4)+','+s.lng.toFixed(4);
  if(!groups[key])groups[key]=[];
  groups[key].push(s);
});

const bounds=new naver.maps.LatLngBounds();
const markerList=[];

Object.values(groups).forEach(grp=>{
  const s0=grp[0];
  const cnt=grp.length;
  const totalS=grp.reduce((a,s)=>a+s.s,0);
  const c=gc(totalS/cnt);
  const r=cnt>1?16:gs(s0.s);

  bounds.extend(new naver.maps.LatLng(s0.lat,s0.lng));

  const markerHtml=cnt>1
    ?`<div style="width:${r*2}px;height:${r*2}px;background:${c};border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.35);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;transition:transform .15s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">${cnt}</div>`
    :`<div style="width:${r*2}px;height:${r*2}px;background:${c};border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.35);cursor:pointer;transition:transform .15s" onmouseover="this.style.transform='scale(1.25)'" onmouseout="this.style.transform='scale(1)'"></div>`;

  const mk=new naver.maps.Marker({
    position:new naver.maps.LatLng(s0.lat,s0.lng),
    map,
    icon:{content:markerHtml,anchor:new naver.maps.Point(r,r)}
  });
  markerList.push(mk);

  let iwContent='';
  if(cnt===1){
    const s=grp[0];
    const cls=s.s>=5000000?'red':s.s>=1000000?'amber':'green';
    iwContent=`<div class="iw" style="position:relative">
      <div class="iw-course">${COURSE}</div>
      <div class="iw-name">${s.n}</div>
      <div class="iw-addr">${s.a}</div>
      <hr class="iw-div">
      <div class="iw-row"><span class="iw-label">매출</span><span class="iw-val ${cls}">${fm(s.s)}</span></div>
      <div class="iw-row"><span class="iw-label">이익</span><span class="iw-val">${fm(s.p)}</span></div>
      <div class="iw-row"><span class="iw-label">마진율</span><span class="iw-val">${pct(s.mg)}</span></div>
      <div class="iw-row"><span class="iw-label">전표수</span><span class="iw-val">${s.t}건</span></div>
      <div class="iw-row"><span class="iw-label">전표당매출</span><span class="iw-val">${fm(s.pt)}</span></div>
      <div class="iw-tail"></div></div>`;
  }else{
    const items=grp.map(s=>{
      const cls=s.s>=5000000?'red':s.s>=1000000?'amber':'green';
      return `<div class="iw-item">
        <div class="iw-item-name">${s.n}</div>
        <div class="iw-item-row"><span class="iw-label">매출</span><span class="iw-val ${cls}">${fm(s.s)}</span></div>
        <div class="iw-item-row"><span class="iw-label">이익</span><span class="iw-val">${fm(s.p)}</span></div>
        <div class="iw-item-row"><span class="iw-label">마진율</span><span class="iw-val">${pct(s.mg)}</span></div>
        <div class="iw-item-row"><span class="iw-label">전표수</span><span class="iw-val">${s.t}건</span></div>
        <div class="iw-item-row"><span class="iw-label">전표당매출</span><span class="iw-val">${fm(s.pt)}</span></div>
      </div>`;
    }).join('<hr class="iw-div">');
    iwContent=`<div class="iw" style="position:relative">
      <div class="iw-course">${COURSE}</div>
      <div class="iw-addr" style="margin-bottom:6px">${s0.a}</div>
      <div class="iw-group-badge">총 ${cnt}개 거래처</div>
      <hr class="iw-div">${items}<div class="iw-tail"></div></div>`;
  }

  const iw=new naver.maps.InfoWindow({content:iwContent,borderWidth:0,disableAnchor:true,backgroundColor:'transparent',pixelOffset:new naver.maps.Point(0,-12)});
  naver.maps.Event.addListener(mk,'click',()=>{
    if(ow)ow.close();
    if(ow===iw){ow=null;return}
    iw.open(map,mk);ow=iw;
  });
});

// 모든 마커가 화면에 들어오도록 자동 조정
if(!bounds.isEmpty()){
  map.fitBounds(bounds,{top:70,right:40,bottom:60,left:40});
}

map.addListener('click',()=>{if(ow){ow.close();ow=null}});
</script>
