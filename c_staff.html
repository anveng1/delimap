const map=new naver.maps.Map('map',{

  mapTypeId:naver.maps.MapTypeId.NORMAL
});
let ow=null;

const groups={};
stores.forEach(s=>{
  if(!s.lat||!s.lng)return;
  const key=s.lat.toFixed(4)+','+s.lng.toFixed(4);
  if(!groups[key])groups[key]=[];
  groups[key].push(s);
});

const bounds=new naver.maps.LatLngBounds();

Object.values(groups).forEach(grp=>{
  const s0=grp[0];
  const cnt=grp.length;
  bounds.extend(new naver.maps.LatLng(s0.lat,s0.lng));

  const markerHtml=cnt>1
    ?`<div style="width:32px;height:32px;background:#03C75A;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;transition:transform .15s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">${cnt}</div>`
    :`<div style="width:22px;height:22px;background:#03C75A;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:pointer;transition:transform .15s" onmouseover="this.style.transform='scale(1.25)'" onmouseout="this.style.transform='scale(1)'"></div>`;

  const mk=new naver.maps.Marker({
    position:new naver.maps.LatLng(s0.lat,s0.lng),
    map,
    icon:{content:markerHtml,anchor:new naver.maps.Point(cnt>1?16:11,cnt>1?16:11)}
  });

  let iwContent='';
  if(cnt===1){
    iwContent=`<div class="iw"><div class="iw-course">${COURSE}</div><div class="iw-name">${s0.n}</div><div class="iw-addr">${s0.a}</div><div class="iw-tail"></div></div>`;
  }else{
    const items=grp.map(s=>`<div class="iw-item">${s.n}</div>`).join('');

  }

  const iw=new naver.maps.InfoWindow({content:iwContent,borderWidth:0,disableAnchor:true,backgroundColor:'transparent',pixelOffset:new naver.maps.Point(0,-12)});

    if(ow)ow.close();
    if(ow===iw){ow=null;return}
    iw.open(map,mk);ow=iw;
  });
});

map.addListener('click',()=>{if(ow){ow.close();ow=null}});
